<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claim Assist — Operations</title>
<style>
  :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
  body { margin: 0; background: #f5f7fb; color: #182230; }
  main { max-width: 1180px; margin: 0 auto; padding: 28px 20px 48px; }
  header { display: flex; justify-content: space-between; gap: 20px; align-items: start; }
  h1, h2 { margin: 0; } h1 { font-size: 28px; } h2 { font-size: 18px; margin: 28px 0 12px; }
  p { color: #526071; }
  button { border: 0; border-radius: 8px; background: #146c43; color: white; padding: 11px 16px; font-weight: 700; cursor: pointer; }
  button:disabled { opacity: .55; cursor: wait; }
  .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
  .card { background: white; border: 1px solid #dde3eb; border-radius: 12px; padding: 16px; box-shadow: 0 1px 2px #1822300b; }
  .label { color: #667488; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .value { font-size: 27px; font-weight: 750; margin-top: 6px; }
  .baseline { background: #eef4ff; border-color: #cadcff; margin-top: 14px; }
  .alert { margin-bottom: 10px; border-left: 5px solid #d88b13; }
  .alert.high, .alert.critical { border-left-color: #bf2828; }
  .alert-head { display: flex; justify-content: space-between; gap: 12px; }
  .pill { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #7a3306; }
  .evidence { font-family: ui-monospace, monospace; font-size: 11px; color: #657183; overflow-wrap: anywhere; }
  .empty { color: #667488; text-align: center; padding: 30px; }
  .status { min-height: 22px; }
  a { color: #0b57d0; }
  @media (max-width: 850px) { .grid { grid-template-columns: repeat(2, 1fr); } header { flex-direction: column; } }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>Claim Assist Operations</h1>
      <p>Live Sentinel evidence from synthetic demo sessions. <a href="/demo/">Open caller demo</a>.</p>
    </div>
    <button id="run">Run deterministic golden path</button>
  </header>
  <div id="run-status" class="status" aria-live="polite"></div>
  <section id="metrics" class="grid" aria-label="Operational metrics"></section>
  <div id="baseline" class="card baseline"></div>
  <h2>Grounded notification preview</h2>
  <section id="preview" class="card empty">No preview yet. The demo never sends a real notification.</section>
  <h2>Active alerts and evidence</h2>
  <section id="alerts"></section>
</main>
<script>
const metricsEl = document.getElementById('metrics');
const alertsEl = document.getElementById('alerts');
const baselineEl = document.getElementById('baseline');
const previewEl = document.getElementById('preview');
const runBtn = document.getElementById('run');
const runStatus = document.getElementById('run-status');
const rate = v => v == null ? 'N/A' : `${(v * 100).toFixed(1)}%`;
const minutes = v => v == null ? 'N/A' : `${v.toFixed(1)} min`;
const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function metric(label, value) {
  return `<div class="card"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`;
}

function renderPreview(preview) {
  if (!preview) return;
  previewEl.className = 'card';
  previewEl.innerHTML = `<div class="label">Preview · ${esc(preview.delivery_status)}</div><strong>${esc(preview.subject)}</strong><p>${esc(preview.message)}</p><div class="evidence">Grounded on ${esc(preview.grounding.table)} / ${esc(preview.grounding.record_id)}</div>`;
}

async function refresh() {
  const [metrics, alerts] = await Promise.all([
    fetch('/api/metrics').then(r => r.json()),
    fetch('/api/alerts').then(r => r.json()),
  ]);
  metricsEl.innerHTML = [
    metric('Average handle time', minutes(metrics.average_handle_time_minutes)),
    metric('First-contact resolution', rate(metrics.first_contact_resolution_rate)),
    metric('Repeat contacts', rate(metrics.repeat_contact_rate)),
    metric('Escalation rate', rate(metrics.escalation_rate)),
    metric('ROI-gap rate', rate(metrics.roi_gap_rate)),
    metric('At-risk claims identified', metrics.at_risk_claims_identified),
    metric('Corrective interventions recorded', metrics.corrective_interventions_recorded),
    metric('Completed sessions', metrics.completed_sessions),
  ].join('');
  baselineEl.innerHTML = `<div class="label">Labeled baseline assumption</div><strong>${esc(metrics.baseline.source_note)}</strong><p>AHT ${minutes(metrics.baseline.aht_minutes)} · FCR ${rate(metrics.baseline.fcr_rate)} · Repeat contacts ${rate(metrics.baseline.repeat_contact_rate)}. These are synthetic comparison assumptions, not historical Humana results.</p>`;
  if (!alerts.length) {
    alertsEl.innerHTML = '<div class="card empty">No active alerts. Run the deterministic golden path or complete a live session.</div>';
    return;
  }
  alertsEl.innerHTML = alerts.map(alert => `<article class="card alert ${esc(alert.severity)}"><div class="alert-head"><strong>${esc(alert.title)}</strong><span class="pill">${esc(alert.severity)}</span></div><p>${esc(alert.description)}</p><p><b>Recommended action:</b> ${esc(alert.recommended_action)}</p><div class="evidence">Evidence events: ${alert.evidence_event_ids.map(esc).join(', ')}</div></article>`).join('');
  fetch('/api/sessions/golden-path-session/summary').then(response => response.ok ? response.json() : null).then(summary => renderPreview(summary && summary.notification_preview)).catch(() => {});
}

runBtn.onclick = async () => {
  runBtn.disabled = true;
  runStatus.textContent = 'Running fixed synthetic IDs through ROI, Claim Story, Benefits, Readiness, preview, intervention, and Sentinel…';
  try {
    const response = await fetch('/api/demo/golden-path', {method: 'POST'});
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await response.json();
    runStatus.textContent = `Complete: ${result.fixed_ids.denied_claim_id} and ${result.fixed_ids.readiness_claim_id}. Notification status: ${result.notification_preview.delivery_status}.`;
    renderPreview(result.notification_preview);
    await refresh();
  } catch (error) {
    runStatus.textContent = `Golden path failed: ${error.message}`;
  } finally {
    runBtn.disabled = false;
  }
};

refresh().catch(error => {
  alertsEl.innerHTML = `<div class="card empty">Dashboard API unavailable: ${esc(error.message)}. Use the saved golden-path backup artifact.</div>`;
});
setInterval(() => refresh().catch(() => {}), 5000);
</script>
</body>
</html>
